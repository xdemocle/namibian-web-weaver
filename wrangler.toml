name = "lizwise-online"
main = "src/worker.ts"
compatibility_date = "2025-06-18"
compatibility_flags = ["nodejs_compat"]

[build]
command = "bun run build"

# Static assets configuration
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = false
# Canonical URLs are slash-free (e.g. /about). The SSG build emits flat files
# (dist/about.html), so drop-trailing-slash serves /about as a 200 and redirects
# /about/, /about.html and /about/index.html to it — keeping one canonical URL.
html_handling = "drop-trailing-slash"

[observability]
logs.enabled = true
