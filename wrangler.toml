name = "lizwise-online"
main = "src/worker.ts"
compatibility_date = "2025-06-18"
compatibility_flags = ["nodejs_compat"]

[build]
command = "bun run build"

[site]
bucket = "./dist"

# Define browser cache TTLs for different file types
[site.bucket_config]
[site.bucket_config.cache_rules]
# Cache static assets for 1 day (86400 seconds)
[site.bucket_config.cache_rules.assets]
patterns = ["*.js", "*.css", "*.jpg", "*.jpeg", "*.png", "*.gif", "*.svg", "*.woff", "*.woff2"]
browser_TTL = 86400

# Cache HTML files for 1 hour (3600 seconds)
[site.bucket_config.cache_rules.html]
patterns = ["*.html"]
browser_TTL = 3600

[observability]
logs.enabled = true
