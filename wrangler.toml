name = "lizwise-online"
main = "src/worker.ts"
compatibility_date = "2025-06-18"
compatibility_flags = ["nodejs_compat"]

[build]
command = "bun run build"

[site]
bucket = "./dist"

# Cache static assets for 1 day (86400 seconds)
[[rules]]
globs = ["*.js", "*.css", "*.jpg", "*.jpeg", "*.png", "*.gif", "*.svg", "*.woff", "*.woff2"]
fallthrough = true
# Cache-Control header sent to browser (max-age in seconds)
browser_ttl = 86400 

# Cache HTML files for 1 hour (3600 seconds)
[[rules]]
globs = ["*.html"]
fallthrough = true
# Cache-Control header sent to browser (max-age in seconds)
browser_ttl = 3600

# Define bindings for workers
[[bindings]]
name = "ASSETS"
type = "text_assets"

[observability]
logs.enabled = true
